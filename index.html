    if (!window.storage) {
      window.storage = {
        async get(key) { const v = localStorage.getItem(key); if (v === null) throw new Error("not found"); return { key, value: v }; },
        async set(key, value) { localStorage.setItem(key, String(value)); return { key, value }; },
        async delete(key) { localStorage.removeItem(key); return { key, deleted: true }; },
        async list(prefix) { const keys = []; for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (!prefix || k.startsWith(prefix)) keys.push(k); } return { keys }; },
      };
    }

function AIOffice() {
  const [active, setActive] = useState(DEFAULT_ACTIVE);
  const [chars, setChars] = useState(() =>
    Object.fromEntries(
      STAFF.map((s, i) => {
        const slot = DESK_SLOTS[Math.max(0, DEFAULT_ACTIVE.indexOf(s.id))] || DESK_SLOTS[0];
        return [s.id, { x: slot.x + 6, y: slot.y + 9, flip: false, moving: false, status: "idle" }];
      })
    )
  );
  const [quotaUsage, setQuotaUsage] = useState({ day: new Date().toDateString(), used: 0 });
  const quotaRef = useRef({ day: new Date().toDateString(), used: 0 });
  const [selected, setSelected] = useState(null);
  const [roster, setRoster] = useState(false);
  const [meeting, setMeeting] = useState(null); // 会議 {topic, log, speakingId, phase}
  const [mtopic, setMtopic] = useState("");
  const [taskOpen, setTaskOpen] = useState(false);
  const [expand, setExpand] = useState(false); // チャット欄を広げる
  const [settingsOpen, setSettingsOpen] = useState(false); // ⚙️APIキー連携(公開版のみ)
  const [apiKey, setApiKey] = useState("");
  const apiKeyRef = useRef("");
  apiKeyRef.current = apiKey;
  const [tasks, setTasks] = useState([]); // {id, title, due(ISO), staffId, done, warnedAt}
  const [tTitle, setTTitle] = useState("");
  const [tDue, setTDue] = useState("");
  const [tWho, setTWho] = useState("");
  const [chats, setChats] = useState({});
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState({});
  const [clock, setClock] = useState("");
  const listRef = useRef(null);
  const activeRef = useRef(active);
  activeRef.current = active;
  const selectedRef = useRef(selected);
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("quota:free");
        if (r && r.value) {
          const parsed = JSON.parse(r.value);
          if (parsed && typeof parsed.used === "number" && typeof parsed.day === "string") {
            const today = new Date().toDateString();
            const normalized = parsed.day === today ? parsed : { day: today, used: 0 };
            quotaRef.current = normalized;
            setQuotaUsage(normalized);
          }
        }
      } catch (e) {}
    })();
  }, []);
  selectedRef.current = selected;
  const charsRef = useRef(chars);
  charsRef.current = chars;
  const visitTimers = useRef({});
  const meetingRef = useRef(false);
  const standupRef = useRef(null);

  const slotOf = useCallback((id) => {
    const i = activeRef.current.indexOf(id);
    return DESK_SLOTS[i >= 0 ? i : 0];
  }, []);

  const FREE_TIER_LIMIT = 10;
  const remainingQuota = Math.max(0, FREE_TIER_LIMIT - quotaUsage.used);

  const consumeQuota = async () => {
    const today = new Date().toDateString();
    const current = quotaRef.current.day === today ? quotaRef.current : { day: today, used: 0 };
    if (current.used >= FREE_TIER_LIMIT) {
      return { ok: false, remaining: 0 };
    }
    const next = { day: today, used: current.used + 1 };
    quotaRef.current = next;
    setQuotaUsage(next);
    try {
      await window.storage.set("quota:free", JSON.stringify(next));
    } catch (e) {}
    return { ok: true, remaining: FREE_TIER_LIMIT - next.used };
  };

  // 時計
  useEffect(() => {
    const t = () =>
      setClock(new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }));
    t();
    const id = setInterval(t, 10000);
    return () => clearInterval(id);
  }, []);

  // 出勤メンバーが変わったら、各自が自分の席へふわっと移動
  useEffect(() => {
    setChars((prev) => {
      const next = { ...prev };
      active.forEach((id, i) => {
        const slot = DESK_SLOTS[i];
        next[id] = { ...prev[id], x: slot.x + 6, y: slot.y + 9, moving: true };
      });
      return next;
    });
    const t = setTimeout(() => {
      setChars((p) => {
        const n = { ...p };
        active.forEach((id) => (n[id] = { ...n[id], moving: false }));
        return n;
      });
    }, 2600);
    return () => clearTimeout(t);
  }, [active]);

  // ===== APIキー連携(公開版のみ) =====
  useEffect(() => {
    if (!IS_PUBLIC) return;
    (async () => {
      try {
        const r = await window.storage.get("settings:apikey");
        if (r && r.value) setApiKey(r.value);
      } catch (e) {}
    })();
  }, []);

  const saveApiKey = async (val) => {
    setApiKey(val);
    try {
      if (val) await window.storage.set("settings:apikey", val);
      else await window.storage.delete("settings:apikey");
    } catch (e) {}
  };

  // API呼び出し用ヘッダー:公開版では連携キーで直接呼ぶ
  const buildHeaders = () => {
    const h = { "Content-Type": "application/json" };
    if (IS_PUBLIC) {
      h["x-api-key"] = apiKeyRef.current || "";
      h["anthropic-version"] = "2023-06-01";
      h["anthropic-dangerous-direct-browser-access"] = "true";
    }
    return h;
  };

  // 公開版で失敗したときの案内文
  const publicFailText = (e) =>
    apiKeyRef.current
      ? `⚠️ APIエラー:${e.message}\n(キーの打ち間違いや残高を確認してみてね)`
      : "ここは公開デモ版だよ🙏 そのままオフィスの見学や社員との会話を楽しんでね!📋タスク管理もどうぞ✨";

  // ===== 端末のホントの状態を監視(読めない項目はnullのまま) =====
  const deviceRef = useRef({ fps: 60, battery: null, charging: null, online: true });
  useEffect(() => {
    // 描画の滑らかさ(FPS)を毎秒計測
    let frames = 0, last = performance.now(), raf;
    const loop = (t) => {
      frames++;
      if (t - last >= 1000) { deviceRef.current.fps = frames; frames = 0; last = t; }
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    // バッテリー(対応ブラウザのみ。iPhoneのSafariでは読めない)
    if (navigator.getBattery) {
      navigator.getBattery().then((b) => {
        const upd = () => { deviceRef.current.battery = b.level; deviceRef.current.charging = b.charging; };
        upd();
        b.addEventListener("levelchange", upd);
        b.addEventListener("chargingchange", upd);
      }).catch(() => {});
    }
    // ネット接続の状態
    const on = () => (deviceRef.current.online = true);
    const off = () => (deviceRef.current.online = false);
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    deviceRef.current.online = navigator.onLine !== false;
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("online", on);
      window.removeEventListener("offline", off);
    };
  }, []);

  // 実測値をまとめた文字列(ビットのチャットに添える)
  const deviceSnapshot = () => {
    const d = deviceRef.current;
    const parts = [`回線: ${d.online ? "オンライン" : "オフライン"}`];
    if (d.battery != null) parts.push(`バッテリー: ${Math.round(d.battery * 100)}%${d.charging ? "(充電中)" : ""}`);
    const mem = typeof performance !== "undefined" ? performance.memory : null;
    if (mem && mem.jsHeapSizeLimit) parts.push(`メモリ使用率: ${Math.round((mem.usedJSHeapSize / mem.jsHeapSizeLimit) * 100)}%`);
    const conn = navigator.connection;
    if (conn && conn.effectiveType) parts.push(`回線タイプ: ${conn.effectiveType}`);
    parts.push(`描画: ${d.fps}fps`);
    return parts.join(" / ");
  };

  // 「不調」と判定したものだけ返す(同じ話題は2分間は再報告しない)
  const lastReport = useRef({});
  const deviceIssues = () => {
    const d = deviceRef.current;
    const now = Date.now();
    const out = [];
    const push = (key, say) => {
      if (now - (lastReport.current[key] || 0) < 120000) return;
      out.push({ key, say });
    };
    if (!d.online) push("offline", "たいへん!ネット回線が切れてるデス!");
    if (d.battery != null && d.battery <= 0.2 && d.charging === false)
      push("battery", `バッテリー残り${Math.round(d.battery * 100)}%デス…充電推奨デス`);
    const mem = typeof performance !== "undefined" ? performance.memory : null;
    if (mem && mem.jsHeapSizeLimit) {
      const pct = Math.round((mem.usedJSHeapSize / mem.jsHeapSizeLimit) * 100);
      if (pct >= 80) push("memory", `メモリー使用率${pct}%…重いデス`);
    }
    const conn = navigator.connection;
    if (conn && (conn.saveData || /(^|-)2g|3g/.test(conn.effectiveType || "")))
      push("network", "回線が遅めみたいデス…");
    if (d.fps > 0 && d.fps < 24) push("fps", `画面がカクついてマス(${d.fps}fps)`);
    return out;
  };

  // 移動の共通処理:目的地へ行って、しばらくしたら席に戻る
  const goVisit = (sid, to, say, status = "visit", stayMs = 9500) => {
    const cur = charsRef.current[sid];
    if (!cur) return;
    setChars((p) => ({ ...p, [sid]: { ...p[sid], x: to.x, y: to.y, flip: to.x < cur.x, moving: true, status, say } }));
    setTimeout(() => setChars((p) => ({ ...p, [sid]: { ...p[sid], moving: false } })), 2600);
    clearTimeout(visitTimers.current[sid]);
    visitTimers.current[sid] = setTimeout(() => {
      setChars((p) => {
        if (!p[sid] || (p[sid].status !== "visit" && p[sid].status !== "report")) return p;
        const i = activeRef.current.indexOf(sid);
        const slot = DESK_SLOTS[i >= 0 ? i : 0];
        return { ...p, [sid]: { ...p[sid], x: slot.x + 6, y: slot.y + 9, flip: slot.x + 6 < p[sid].x, say: null, status: "idle", moving: true } };
      });
      setTimeout(() => setChars((p) => ({ ...p, [sid]: { ...p[sid], moving: false } })), 2600);
    }, stayMs);
  };

  // ===== 会議・朝会 =====
  // シンプルなAI呼び出し(fetch失敗時はcompleteで再挑戦)
  const rawAI = async (userText) => {
    const quota = await consumeQuota();
    if (!quota.ok) {
      throw new Error("無料枠の上限に達しました。今日はこれ以上AIを使えません。")
    }
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: buildHeaders(),
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: userText }] }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || "api error");
      const t = (data.content || []).map((b) => (b.type === "text" ? b.text : "")).filter(Boolean).join("\n");
      if (!t) throw new Error("empty");
      return t;
    } catch (e) {
      if (typeof window !== "undefined" && window.claude && window.claude.complete) {
        const t = await window.claude.complete(userText);
        return typeof t === "string" ? t : JSON.stringify(t);
      }
      throw e;
    }
  };

  // 全員を自分の席に帰す
  const disperse = () => {
    const members = activeRef.current.slice();
    setChars((p) => {
      const q = { ...p };
      members.forEach((sid) => {
        const i = activeRef.current.indexOf(sid);
        const slot = DESK_SLOTS[i >= 0 ? i : 0];
        q[sid] = { ...p[sid], x: slot.x + 6, y: slot.y + 9, flip: slot.x + 6 < p[sid].x, moving: true, status: "idle", say: null };
      });
      return q;
    });
    setTimeout(() => setChars((p) => {
      const q = { ...p };
      members.forEach((sid) => (q[sid] = { ...q[sid], moving: false }));
      return q;
    }), 2600);
  };

  const openMeeting = () => {
    if (meetingRef.current || meeting) return;
    setSelected(null);
    setRoster(false);
    setMeeting({ topic: "", log: [], speakingId: null, phase: "input" });
  };

  const closeMeeting = () => {
    const wasRunning = meetingRef.current;
    meetingRef.current = false;
    if (wasRunning || (meeting && meeting.phase === "done")) disperse();
    setMeeting(null);
    setMtopic("");
  };

  const startMeeting = async () => {
    const topic = mtopic.trim();
    if (!topic || meetingRef.current) return;
    const members = activeRef.current.slice();
    if (!members.length) return;
    meetingRef.current = true;
    setMeeting({ topic, log: [], speakingId: null, phase: "running" });
    // ラグの周りに円になって集合
    const n = members.length;
    setChars((p) => {
      const q = { ...p };
      members.forEach((sid, i) => {
        const th = -Math.PI / 2 + (i * 2 * Math.PI) / n;
        const x = Math.min(92, Math.max(8, 50 + 26 * Math.cos(th)));
        const y = Math.min(78, Math.max(48, 62 + 14 * Math.sin(th)));
        clearTimeout(visitTimers.current[sid]);
        q[sid] = { ...p[sid], x, y, flip: Math.cos(th) > 0.2, moving: true, status: "meeting", say: null };
      });
      return q;
    });
    setTimeout(() => setChars((p) => {
      const q = { ...p };
      members.forEach((sid) => (q[sid] = { ...q[sid], moving: false }));
      return q;
    }), 2600);
    await new Promise((r) => setTimeout(r, 2800));

    const nameOf = (sid) => STAFF.find((s) => s.id === sid);
    const log = [];
    // 出勤メンバーが順番に発言(前の人の意見も見える)
    for (const sid of members) {
      if (!meetingRef.current) return; // ✕で中断された
      const st = nameOf(sid);
      setMeeting((m) => (m ? { ...m, speakingId: sid } : m));
      setChars((p) => ({ ...p, [sid]: { ...p[sid], say: "💬" } }));
      try {
        const prevOps = log.map((l) => `${nameOf(l.id).name}(${nameOf(l.id).role}): ${l.text}`).join("\n");
        const prompt = `【あなたの設定】\n${st.system}\n\nいまは社内会議中です。議題:「${topic}」\n${prevOps ? `これまでの発言:\n${prevOps}\n\n` : ""}あなた(${st.name}/${st.role})の専門の視点から、この議題への意見を2〜3文で簡潔に。前の人の発言に触れてもOK。返答の本文だけを書いてください。`;
        const text = await rawAI(prompt);
        log.push({ id: sid, text });
      } catch (e) {
        const errText = e && e.message && e.message.includes("無料枠")
          ? `⚠️ ${e.message}`
          : IS_PUBLIC
            ? (apiKeyRef.current ? `(APIエラー:${e.message})` : "(⚙️でAPIキーを連携すると発言できるよ)")
            : "(接続エラーで発言できませんでした…)";
        log.push({ id: sid, text: errText });
      }
      setChars((p) => ({ ...p, [sid]: { ...p[sid], say: null } }));
      setMeeting((m) => (m ? { ...m, log: [...log] } : m));
    }
    // シエルが出勤中なら、最後にまとめと次のアクション
    if (meetingRef.current && members.includes("ciel") && log.length > 1) {
      setMeeting((m) => (m ? { ...m, speakingId: "ciel" } : m));
      setChars((p) => ({ ...p, ciel: { ...p.ciel, say: "📝" } }));
      try {
        const all = log.map((l) => `${nameOf(l.id).name}(${nameOf(l.id).role}): ${l.text}`).join("\n");
        const text = await rawAI(`あなたは秘書のシエル(上品で丁寧、親しみやすい敬語)です。以下の会議の発言をふまえて、「まとめ」と「次のアクション(最大3つ)」を短く整理してください。本文だけ書いてください。\n\n議題:「${topic}」\n${all}`);
        log.push({ id: "ciel", text, sum: true });
      } catch (e) {}
      setChars((p) => ({ ...p, ciel: { ...p.ciel, say: null } }));
    }
    if (!meetingRef.current) return;
    meetingRef.current = false;
    setMeeting((m) => (m ? { ...m, log: [...log], speakingId: null, phase: "done" } : m));
  };

  // タスクを保存(自動)
  useEffect(() => {
    (async () => {
      try {
        await window.storage.set("tasks:list", JSON.stringify(tasks));
      } catch (e) {}
    })();
  }, [tasks]);

  // 初回読み込み
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("tasks:list");
        if (r) setTasks(JSON.parse(r.value));
      } catch (e) {}
    })();
  }, []);

  // 朝会:その日はじめて開いたとき、シエルが挨拶に来る
  useEffect(() => {
    (async () => {
      const today = new Date().toDateString();
      let last = null;
      try {
        const r = await window.storage.get("standup:last");
        last = r && r.value;
      } catch (e) { /* 初回はキーが無くてエラーになるのでOK */ }
      if (last === today) return;
      try { await window.storage.set("standup:last", today); } catch (e) {}
      setTimeout(() => {
        if (meetingRef.current) return;
        const host = activeRef.current.includes("ciel") ? "ciel" : activeRef.current[0];
        if (!host) return;
        const c = charsRef.current[host];
        if (!c || c.status !== "idle") return;
        standupRef.current = host;
        goVisit(host, { x: 48, y: 76 }, "おはようございます!朝会しましょう🌅", "report", 30000);
      }, 2500);
    })();
  }, []);

  // 基本は自席でぴょこぴょこ。移動するのは「用事があるとき」だけ
  useEffect(() => {
    const LINES = [
      { say: "何かお仕事ないですか?", spot: "front" },
      { say: "コーヒー休憩です☕", spot: "coffee" },
      { say: "お水くんできます!", spot: "water" },
    ];
    const SPOTS = { coffee: { x: 90, y: 79 }, water: { x: 73, y: 81 } };
    const id = setInterval(() => {
      const prev = charsRef.current;
      if (meetingRef.current) return;
      // 訪問は一度に1人まで
      if (Object.values(prev).some((c) => c.status === "visit" || c.status === "report")) return;
      
      // ① タスク締切警告(最優先)
      const now = Date.now();
      for (const task of tasks) {
        if (task.done) continue;
        const due = new Date(task.due).getTime();
        const msLeft = due - now;
        const hoursLeft = msLeft / 3600000;
        let warn = null;
        if (hoursLeft < 1) warn = "1h";
        else if (hoursLeft < 24) warn = "24h";
        if (!warn) continue;
        if (task.warnedAt && task.warnedAt[warn]) continue; // 既に警告済み
        
        const staff = STAFF.find((s) => s.id === task.staffId);
        if (!staff || !activeRef.current.includes(task.staffId)) continue;
        const c = prev[task.staffId];
        if (!c || c.status !== "idle") continue;
        
        // 警告フラグを立てて、前に来させる
        setTasks((tt) => tt.map((tsk) => 
          tsk.id === task.id 
            ? { ...tsk, warnedAt: { ...tsk.warnedAt, [warn]: true } }
            : tsk
        ));
        const h = Math.round(hoursLeft);
        const say = hoursLeft < 1 
          ? `「${task.title}」、締切超過です…`
          : `「${task.title}」、締切まであと${h}時間ですけど…`;
        goVisit(task.staffId, { x: 46 + Math.random() * 10, y: 76 }, say, "report", 10000);
        return;
      }
      
      // ② 端末の不調は、システム管理のビットだけが報告に来る(出勤中のときだけ)
      const bit = prev["bit"];
      if (activeRef.current.includes("bit") && bit && bit.status === "idle" && !bit.moving) {
        const issues = deviceIssues();
        if (issues.length) {
          lastReport.current[issues[0].key] = Date.now();
          goVisit("bit", { x: 46 + Math.random() * 10, y: 76 }, issues[0].say, "report", 12000);
          return;
        }
      }
      
      // ③ それ以外は、ときどき誰かが用事で動く
      if (Math.random() > 0.3) return;
      const idle = activeRef.current.filter(
        (sid) => prev[sid] && prev[sid].status === "idle" && !prev[sid].moving
      );
      if (!idle.length) return;
      const sid = idle[Math.floor(Math.random() * idle.length)];
      const line = LINES[Math.floor(Math.random() * LINES.length)];
      const to = line.spot === "front" ? { x: 42 + Math.random() * 16, y: 76 } : SPOTS[line.spot];
      goVisit(sid, to, line.say);
    }, 8000);
    return () => {
      clearInterval(id);
      Object.values(visitTimers.current).forEach(clearTimeout);
    };
  }, [tasks]);

  useEffect(() => {
    if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
  }, [chats, selected, busy, meeting]);

  const moveTo = useCallback((id, x, y) => {
    setChars((p) => ({ ...p, [id]: { ...p[id], x, y, flip: x < p[id].x, moving: true } }));
    setTimeout(() => setChars((p) => ({ ...p, [id]: { ...p[id], moving: false } })), 2600);
  }, []);

  const toggleStaff = (id) => {
    setActive((prev) => {
      if (prev.includes(id)) {
        if (selected === id) setSelected(null);
        return prev.filter((a) => a !== id);
      }
      return [...prev, id];
    });
  };

  // 社員をタップ:用事があって出てきてた子は、そのセリフからチャットが始まる
  const pickStaff = (sid) => {
    if (meeting) return; // 会議中は会議に集中!
    setRoster(false);
    setSelected(sid);
    setChars((p) => {
      const c = p[sid];
      if (!c || !c.say || (c.status !== "visit" && c.status !== "report")) return p;
      const line = c.say;
      // セリフをチャット画面に引き継ぐ(local=API送信時には除外する表示専用メッセージ)
      setChats((cp) => ({ ...cp, [sid]: [...(cp[sid] || []), { role: "assistant", content: line, local: true }] }));
      clearTimeout(visitTimers.current[sid]);
      const i = activeRef.current.indexOf(sid);
      const slot = DESK_SLOTS[i >= 0 ? i : 0];
      setTimeout(() => setChars((q) => ({ ...q, [sid]: { ...q[sid], moving: false } })), 2600);
      return { ...p, [sid]: { ...c, x: slot.x + 6, y: slot.y + 9, flip: slot.x + 6 < c.x, say: null, status: "idle", moving: true } };
    });
  };

  const send = async () => {
    const text = input.trim();
    if (!text || !selected || busy[selected]) return;
    const staff = STAFF.find((s) => s.id === selected);
    const history = chats[selected] || [];
    const newHistory = [...history, { role: "user", content: text }];
    setChats((p) => ({ ...p, [selected]: newHistory }));
    setInput("");
    setBusy((p) => ({ ...p, [selected]: true }));
    const home = slotOf(selected);
    moveTo(selected, home.x + 6, home.y + 9);
    setChars((p) => ({ ...p, [selected]: { ...p[selected], status: "working" } }));

    // ルートA:標準のfetchでAPIを呼ぶ(表示専用のセリフはAPIに送らない)
    const callViaFetch = async () => {
      const quota = await consumeQuota();
      if (!quota.ok) {
        throw new Error("無料枠の上限に達しました。今日はこれ以上AIを使えません。")
      }
      const src = newHistory.filter((m) => !m.local);
      // ビット宛なら端末状態、朝会中のシエルには朝会の指示を添える
      const staffList = activeRef.current
        .map((aid) => { const s2 = STAFF.find((x) => x.id === aid); return `${s2.name}=${s2.role}`; })
        .join("、");
      const extra =
        (staff.id === "bit" ? `\n\n【いま実測した端末の状態】${deviceSnapshot()}` : "") +
        (standupRef.current === staff.id
          ? `\n\n【朝会モード】いまは朝の打ち合わせです。上司の今日の予定を聞いて優先順位を整理し、出勤中の社員(${staffList})への振り分けを提案してください。`
          : "");
      const lastUser = src.map((m) => m.role).lastIndexOf("user");
      const apiMessages = src.map((m, i) => {
        let content = m.content;
        if (i === 0 && m.role === "user") {
          content = `【あなたの設定】\n${staff.system}\nこの設定のキャラクターとして返答してください。\n\n【上司からの指示】\n${content}`;
        }
        if (i === lastUser && extra) content += extra;
        return { role: m.role, content };
      });
      const body = { model: "claude-sonnet-4-6", max_tokens: 1000, messages: apiMessages };
      if (staff.useSearch) {
        body.tools = [{ type: "web_search_20250305", name: "web_search" }];
      }
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: buildHeaders(),
        body: JSON.stringify(body),
      });
      let data;
      try {
        data = await res.json();
      } catch {
        throw new Error(`HTTP ${res.status}: 返事がJSONじゃなかった`);
      }
      if (data.error) {
        throw new Error(`${data.error.type || "api_error"}: ${data.error.message || JSON.stringify(data.error)}`);
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return (data.content || [])
        .map((b) => (b.type === "text" ? b.text : ""))
        .filter(Boolean)
        .join("\n");
    };

    // ルートB:古い環境向けの window.claude.complete(予備ルート)
    const callViaComplete = async () => {
      const quota = await consumeQuota();
      if (!quota.ok) {
        throw new Error("無料枠の上限に達しました。今日はこれ以上AIを使えません。")
      }
      if (typeof window === "undefined" || !window.claude || !window.claude.complete) {
        throw new Error("この環境ではcompleteが使えない");
      }
      const transcript = newHistory
        .filter((m) => !m.local)
        .map((m) => (m.role === "user" ? `上司: ${m.content}` : `${staff.name}: ${m.content}`))
        .join("\n\n");
      const extra =
        (staff.id === "bit" ? `\n\n【いま実測した端末の状態】${deviceSnapshot()}` : "") +
        (standupRef.current === staff.id ? "\n\n【朝会モード】いまは朝の打ち合わせです。上司の今日の予定を聞いて優先順位を整理し、社員への振り分けを提案してください。" : "");
      const prompt = `【あなたの設定】\n${staff.system}\n\n以下はこれまでの会話です。設定どおりのキャラクター「${staff.name}」として、最後の指示に返答してください。返答の本文だけを書いてください。\n\n${transcript}${extra}`;
      const txt = await window.claude.complete(prompt);
      return typeof txt === "string" ? txt : JSON.stringify(txt);
    };

    try {
      let reply = "";
      try {
        reply = await callViaFetch();
      } catch (e1) {
        try {
          reply = await callViaComplete();
        } catch (e2) {
          throw new Error(`ルートA(fetch): ${e1.message}\nルートB(complete): ${e2.message}`);
        }
      }
      if (!reply) reply = "（うまく返事できなかった…もう一回頼んでみて）";
      setChats((p) => ({ ...p, [selected]: [...newHistory, { role: "assistant", content: reply }] }));
      if (standupRef.current === staff.id) standupRef.current = null;
      if (selectedRef.current === staff.id) {
        // チャットを見てるなら、席で「できたよ!」
        setChars((p) => ({ ...p, [staff.id]: { ...p[staff.id], status: "done" } }));
        setTimeout(
          () => setChars((p) => ({ ...p, [staff.id]: { ...p[staff.id], status: "idle" } })),
          2500
        );
      } else {
        // チャットを閉じてるなら、前まで来て「仕事終わりました!」と報告
        setChars((p) => {
          const c = p[staff.id];
          const to = { x: 46 + Math.random() * 10, y: 76 };
          return { ...p, [staff.id]: { ...c, x: to.x, y: to.y, flip: to.x < c.x, moving: true, status: "report", say: "仕事終わりました!" } };
        });
        setTimeout(() => setChars((p) => ({ ...p, [staff.id]: { ...p[staff.id], moving: false } })), 2600);
        clearTimeout(visitTimers.current[staff.id]);
        visitTimers.current[staff.id] = setTimeout(() => {
          setChars((p) => {
            if (!p[staff.id] || p[staff.id].status !== "report") return p;
            const i = activeRef.current.indexOf(staff.id);
            const slot = DESK_SLOTS[i >= 0 ? i : 0];
            return { ...p, [staff.id]: { ...p[staff.id], x: slot.x + 6, y: slot.y + 9, flip: slot.x + 6 < p[staff.id].x, say: null, status: "idle", moving: true } };
          });
          setTimeout(() => setChars((p) => ({ ...p, [staff.id]: { ...p[staff.id], moving: false } })), 2600);
        }, 10000);
      }
    } catch (e) {
      const errorText = e && e.message && e.message.includes("無料枠")
        ? `⚠️ ${e.message}`
        : IS_PUBLIC
          ? publicFailText(e)
          : `⚠️ エラーが出ちゃった:\n${e.message}\n\nこのメッセージをナナさんに見せてね!`;
      setChats((p) => ({
        ...p,
        [selected]: [...newHistory, { role: "assistant", content: errorText }],
      }));
      setChars((p) => ({ ...p, [selected]: { ...p[selected], status: "idle" } }));
    } finally {
      setBusy((p) => ({ ...p, [selected]: false }));
    }
  };

  const sel = STAFF.find((s) => s.id === selected);
  const activeStaff = active.map((id) => STAFF.find((s) => s.id === id)).filter(Boolean);

  return (
    <div className="app">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
        .app {
          font-family: 'Zen Maru Gothic','Hiragino Maru Gothic ProN','ヒラギノ丸ゴ ProN',sans-serif;
          height: 100vh; height: 100dvh; display: flex; flex-direction: column;
          background: #FFF9EF; color: #4A3F35; overflow: hidden; user-select: none;
        }
        /* ===== ヘッダー ===== */
        .head {
          display: flex; align-items: center; gap: 8px;
          padding: 10px 14px; background: #E9E8E4; color: #4A4A48;
          border-bottom: 4px solid #D5D3CD; flex-shrink: 0;
        }
        .head h1 { font-size: 15px; font-weight: 900; letter-spacing: .5px; flex: 1; min-width:0; display:flex; flex-direction:column; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .head h1 .sub { font-size: 9px; font-weight:700; letter-spacing: 1.5px; opacity: .55; }
        .head .clock { font-size: 13px; font-weight: 700; background: rgba(0,0,0,.06); padding: 3px 10px; border-radius: 999px; }

                />
              </div>
              <div style={{ display: "flex", gap: "6px", marginBottom: "8px" }}>
                <input
                  type="datetime-local"
                  value={tDue}
                  onChange={(e) => setTDue(e.target.value)}
                  style={{ flex: 1, borderRadius: "6px", border: "2px solid #EADFC8", padding: "6px 8px", fontFamily: "inherit", fontSize: "12px" }}
                />
              </div>
              <div style={{ display: "flex", gap: "6px", marginBottom: "8px" }}>
                <select
                  value={tWho}
                  onChange={(e) => setTWho(e.target.value)}
                  style={{ flex: 1, borderRadius: "6px", border: "2px solid #EADFC8", padding: "6px 8px", fontFamily: "inherit", fontSize: "13px" }}
                >
                  <option value="">担当を選ぶ…</option>
                  {STAFF.map((s) => (
                    <option key={s.id} value={s.id}>{s.emoji} {s.name}</option>
                  ))}
                </select>
                <button
                  onClick={() => {
                    if (!tTitle.trim() || !tDue || !tWho) return;
                    setTasks((tt) => [...tt, { id: Date.now(), title: tTitle, due: tDue, staffId: tWho, done: false, warnedAt: {} }]);
                    setTTitle("");
                    setTDue("");
                    setTWho("");
                  }}
                  style={{ borderRadius: "6px", border: "none", background: "#FF8A7A", color: "#fff", fontWeight: "900", padding: "6px 12px", fontSize: "13px", fontFamily: "inherit" }}
                  disabled={!tTitle.trim() || !tDue || !tWho}
                >
                  追加
                </button>
              </div>
            </div>
            {tasks.length === 0 ? (
              <div style={{ textAlign: "center", padding: "20px", color: "#9A8B77", fontSize: "13px" }}>
                タスクをいま登録すると、締切が迫ったら担当の子が教えてくれるよ
              </div>
            ) : (
              tasks.map((t) => {
                const st = STAFF.find((s) => s.id === t.staffId);
                const due = new Date(t.due);
                const now = new Date();
                const hoursLeft = (due - now) / 3600000;
                const status = t.done ? "完了" : hoursLeft < 1 ? "超過" : hoursLeft < 24 ? "緊急" : "進行中";
                return (
                  <div key={t.id} className="taskrow" style={{ opacity: t.done ? 0.55 : 1 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: "13px", fontWeight: "700", marginBottom: "2px", textDecoration: t.done ? "line-through" : "none" }}>
                        {t.title}
                      </div>
                      <div style={{ fontSize: "11px", color: "#9A8B77", marginBottom: "4px" }}>
                        {st.emoji} {st.name} • {due.toLocaleDateString("ja-JP", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}
                      </div>
                      <div style={{ fontSize: "10px", display: "inline-block", padding: "2px 6px", borderRadius: "3px", 
                        background: status === "超過" ? "#FFD4CC" : status === "緊急" ? "#FFE9C7" : status === "完了" ? "#DFF7E4" : "#F5F5F5",
                        color: status === "超過" ? "#E06B5C" : status === "緊急" ? "#D89A3D" : status === "完了" ? "#57A576" : "#9A8B77"
                      }}>
                        {status}
                      </div>
                    </div>
                    <button
                      onClick={() => setTasks((tt) => tt.map((tsk) => tsk.id === t.id ? { ...tsk, done: !tsk.done } : tsk))}
                      style={{ borderRadius: "50%", border: "2px solid #EADFC8", background: t.done ? "#DFF7E4" : "#fff", color: "#9A8B77", fontWeight: "900", width: "32px", height: "32px", fontSize: "14px", fontFamily: "inherit" }}
                    >
                      {t.done ? "✓" : "○"}
                    </button>
                  </div>
                );
              })
            )}
          </div>
        </div>
      ) : meeting ? (
        <div className="sheet">
          <div className="sheethead">
            <div className="avatar" style={{ background: "#A5D8C8" }}>🪑</div>
            <div className="who">
              <b>全体会議</b>
              <small>{meeting.phase === "input" ? `出勤中の${active.length}人が参加するよ` : meeting.topic}</small>
            </div>
            <button className="close" onClick={() => setExpand(!expand)}>{expand ? "▼" : "▲"}</button>
            <button className="close" onClick={closeMeeting}>✕</button>
          </div>
          {meeting.phase === "input" ? (
            <>
              <div className="hint">
                <div className="big">🪑</div>
                <div>議題を入れると、みんながラグに集まって<br />専門の目線で順番に意見をくれるよ</div>
              </div>
              <div className="inputrow">
                <input
                  value={mtopic}
                  onChange={(e) => setMtopic(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && startMeeting()}
                  placeholder="議題(例:新サービスの名前どうする?)"
                />
                <button onClick={startMeeting} disabled={!mtopic.trim()}>開始!</button>
              </div>
            </>
          ) : (
            <div className="msgs" ref={listRef}>
              {meeting.log.map((l, i) => {
                const st = STAFF.find((s) => s.id === l.id);
                return (
                  <div key={i} className={"mrow" + (l.sum ? " sum" : "")}>
                    <div className="avatar" style={{ background: st.body }}>{st.emoji}</div>
                    <div className="mtext"><b>{st.name}{l.sum ? "(まとめ)" : ""}</b>{l.text}</div>
                  </div>
                );
              })}
              {meeting.phase === "running" && (
                <div className="typing">
                  {meeting.speakingId
                    ? `${STAFF.find((s) => s.id === meeting.speakingId).name}が発言中…💬`
                    : "みんな集合中…"}
                </div>
              )}
              {meeting.phase === "done" && (
                <button className="endmeet" onClick={closeMeeting}>会議おわり!解散〜</button>
              )}
            </div>
          )}
        </div>
      ) : sel ? (
        <div className="sheet">
          <div className="sheethead">
            <div className="avatar" style={{ background: sel.body }}>{sel.emoji}</div>
            <div className="who">
              <b>{sel.name}</b>
              <small>{sel.role}担当{sel.useSearch ? "・Web検索できる" : ""}</small>
            </div>
            <button className="close" onClick={() => setExpand(!expand)}>{expand ? "▼" : "▲"}</button>
            <button className="close" onClick={() => setSelected(null)}>✕</button>
          </div>
          <div className="msgs" ref={listRef}>
            {(chats[sel.id] || []).length === 0 && (
              <div className="msg a">
                やっほー、{sel.name}だよ!{sel.role}のことなら任せて。何をお願いする?
              </div>
            )}
            {(chats[sel.id] || []).map((m, i) => (
              <div key={i} className={"msg " + (m.role === "user" ? "u" : "a")}>{m.content}</div>
            ))}
            {busy[sel.id] && <div className="typing">{sel.name}が作業中…⚙️</div>}
          </div>
          <div className="inputrow">
            <input
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && send()}
              placeholder={`${sel.name}に指示を出す…`}
            />
            <button onClick={send} disabled={busy[sel.id] || !input.trim()}>頼む!</button>
          </div>
        </div>
      ) : roster ? (
        <div className="sheet">
          <div className="sheethead">
            <div className="avatar" style={{ background: "#EADFC8" }}>👥</div>
            <div className="who"><b>社員名簿</b><small>出勤/休みを切り替えられるよ(最大{STAFF.length}人)</small></div>
            <button className="close" onClick={() => setExpand(!expand)}>{expand ? "▼" : "▲"}</button>
            <button className="close" onClick={() => setRoster(false)}>✕</button>
          </div>
          <div className="rlist">
            {STAFF.map((s) => {
              const on = active.includes(s.id);
              return (
                <div className="rrow" key={s.id}>
                  <div className="avatar" style={{ background: s.body }}>{s.emoji}</div>
                  <div className="who"><b>{s.name}</b><small>{s.role}{s.useSearch ? "・Web検索OK" : ""}</small></div>
                  <button className={"togl " + (on ? "on" : "off")} onClick={() => toggleStaff(s.id)}>
                    {on ? "出勤中" : "休み"}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      ) : (
        <div className="hint">
          <div className="big">👆</div>
          <div>社員をタップして指示を出してみて!</div>
          <div style={{ fontSize: 12, fontWeight: 500 }}>
            右上の「👥」から社員を出勤させたり休ませたりできるよ
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(<AIOffice />);
  </script>
</body>
</html>
